name: Update APT repository

on:
  push:
    paths:
      - "debs/**/*.deb"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install APT tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Generate Packages index
        run: |
          dpkg-scanpackages -m debs /dev/null > Packages
          gzip -9fk Packages

      - name: Generate Release file
        run: |
          {
            echo "Origin: A11pwnx repo"
            echo "Label: A11pwnx repo"
            echo "Suite: stable"
            echo "Codename: ios"
            echo "Version: 1.0"
            echo "Architectures: iphoneos-arm iphoneos-arm64"
            echo "Components: main"
            echo "Description: Repository for my iOS tweaks"
            echo "Date: $(date -Ru)"
            echo "MD5Sum:"
            md5sum Packages Packages.gz | awk '{printf " %s %16d %s\n", $1, $2, $3}'
            echo "SHA256:"
            sha256sum Packages Packages.gz | awk '{printf " %s %16d %s\n", $1, $2, $3}'
          } > Release

      - name: Commit generated repository files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Packages Packages.gz Release

          if git diff --cached --quiet; then
            echo "No repository metadata changes."
            exit 0
          fi

          git commit -m "Update APT metadata"
          git push
